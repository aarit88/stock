services:
  # Deployment for the Flask Application (app.py)
  - type: web
    name: stockscraper-flask
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_ENV
        value: production

  # Deployment for the Streamlit Application (streamlit_app.py)
  - type: web
    name: stockscraper-streamlit
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
